<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prosser Shootout | Prosser Basketball</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { font-family: Arial, sans-serif; }
    .hero {
      background: linear-gradient(rgba(128,0,0,.75), rgba(0,0,0,.7)),
        url('https://codehs.com/uploads/2b79ba139e6f612ce6b8f2f44f6a5a11') center/cover no-repeat;
      color: white;
      min-height: 65vh;
      display: flex;
      align-items: center;
    }
    .section-title { font-weight: 700; margin-bottom: 1rem; }
    .info-card {
      border: none;
      border-radius: 16px;
      box-shadow: 0 6px 20px rgba(0,0,0,.08);
      height: 100%;
      border-top: 4px solid #b30000;
    }
    a:hover .info-card {
      transform: translateY(-6px);
      box-shadow: 0 12px 28px rgba(0,0,0,.18);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      cursor: pointer;
    }
    .shootout-alert {
      background: linear-gradient(90deg, #8B0000, #b30000);
      color: white;
      border-radius: 18px;
      box-shadow: 0 10px 24px rgba(0,0,0,.18);
    }
    .shootout-glow {
      box-shadow: 0 0 0 4px rgba(255,255,255,.18), 0 10px 24px rgba(0,0,0,.2);
      font-weight: 700;
    }
    footer { background-color: #8B0000; color: white; }
  </style>
</head>
<body>

  <!-- everything above unchanged -->

  <section class="py-5 bg-light">
    <div class="container text-center">
      <h2 class="section-title">Photos from Previous Tournaments</h2>
      <div id="tourneyCarousel" class="carousel slide" data-bs-ride="carousel" data-bs-interval="3000" data-bs-pause="false">
        <div class="carousel-indicators">
          <button type="button" data-bs-target="#tourneyCarousel" data-bs-slide-to="0" class="active"></button>
          <button type="button" data-bs-target="#tourneyCarousel" data-bs-slide-to="1"></button>
          <button type="button" data-bs-target="#tourneyCarousel" data-bs-slide-to="2"></button>
          <button type="button" data-bs-target="#tourneyCarousel" data-bs-slide-to="3"></button>
          <button type="button" data-bs-target="#tourneyCarousel" data-bs-slide-to="4"></button>
          <button type="button" data-bs-target="#tourneyCarousel" data-bs-slide-to="5"></button>
        </div>

        <div class="carousel-inner rounded-4 shadow">

          <div class="carousel-item active">
            <img src="images/game1.jpg" class="d-block w-100" style="height:500px; object-fit:cover;">
          </div>

          <div class="carousel-item">
            <img src="images/game2.jpg" class="d-block w-100" style="height:500px; object-fit:cover;">
          </div>

          <div class="carousel-item">
            <img src="images/game3.jpg" class="d-block w-100" style="height:500px; object-fit:cover;">
          </div>

          <div class="carousel-item">
            <img src="images/game4.jpg" class="d-block w-100" style="height:500px; object-fit:cover;">
          </div>

          <div class="carousel-item">
            <img src="images/game5.jpg" class="d-block w-100" style="height:500px; object-fit:cover;">
          </div>

          <div class="carousel-item">
            <img src="images/game6.jpg" class="d-block w-100" style="height:500px; object-fit:cover;">
          </div>

          <div class="carousel-item">
            <img src="images/game7.jpg" class="d-block w-100" style="height:500px; object-fit:cover;">
          </div>

          <div class="carousel-item">
            <img src="images/game8.jpg" class="d-block w-100" style="height:500px; object-fit:cover;">
          </div>

        </div> <!-- ✅ THIS WAS MISSING -->

        <button class="carousel-control-prev" type="button" data-bs-target="#tourneyCarousel" data-bs-slide="prev">
          <span class="carousel-control-prev-icon"></span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#tourneyCarousel" data-bs-slide="next">
          <span class="carousel-control-next-icon"></span>
        </button>
      </div>
    </div>
  </section>

  <!-- everything below unchanged -->

</body>
</html>
